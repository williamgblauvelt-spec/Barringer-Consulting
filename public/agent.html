<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barringer — Website Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0D2B1A;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #ffffff;
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 560px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: #2D6A4F;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 16px;
    color: white;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    color: #1B4332;
  }

  .logo-sub {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #6B7280;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 14px;
    color: #6B7280;
    margin-bottom: 28px;
    line-height: 1.6;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6B7280;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    height: 120px;
    padding: 14px 16px;
    border: 1px solid #E5E7EB;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: #111827;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }

  textarea:focus {
    border-color: #2D6A4F;
  }

  textarea::placeholder {
    color: #9CA3AF;
  }

  button {
    width: 100%;
    padding: 14px 24px;
    background: #1B4332;
    color: white;
    border: none;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }

  button:hover { background: #2D6A4F; }
  button:disabled { background: #9CA3AF; cursor: not-allowed; }

  .status {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 6px;
    font-size: 14px;
    line-height: 1.5;
    display: none;
  }

  .status.loading {
    display: block;
    background: #F0FBF2;
    color: #1B4332;
    border: 1px solid #D8F3DC;
  }

  .status.success {
    display: block;
    background: #F0FBF2;
    color: #1B4332;
    border: 1px solid #D8F3DC;
  }

  .status.error {
    display: block;
    background: #FEF2F2;
    color: #991B1B;
    border: 1px solid #FECACA;
  }

  .divider {
    border: none;
    border-top: 1px solid #F3F4F6;
    margin: 28px 0;
  }

  .history-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6B7280;
    margin-bottom: 12px;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 200px;
    overflow-y: auto;
  }

  .history-item {
    padding: 10px 14px;
    background: #F9FAFB;
    border-radius: 6px;
    font-size: 13px;
    color: #374151;
    line-height: 1.5;
    border: 1px solid #F3F4F6;
  }

  .history-item .time {
    font-size: 11px;
    color: #9CA3AF;
    margin-top: 4px;
  }

  .no-history {
    font-size: 13px;
    color: #9CA3AF;
    font-style: italic;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(27,67,50,0.3);
    border-top-color: #1B4332;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
    h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">B</div>
    <span class="logo-text">Barringer Consulting</span>
  </div>

  <p class="logo-sub">Website Agent</p>

  <h1>What do you want to change?</h1>
  <p class="subtitle">Describe any change in plain English. The agent will update your site automatically.</p>

  <label for="instruction">Your instruction</label>
  <textarea
    id="instruction"
    placeholder="e.g. Change the hero headline to something more direct. Make the CTA button say Book a Free Call. Add a new bullet point to the Sales Training section..."
  ></textarea>

  <button id="submitBtn" onclick="sendInstruction()">Send to Website Agent</button>

  <div id="status" class="status"></div>

  <hr class="divider">

  <p class="history-label">Recent changes</p>
  <div class="history-list" id="historyList">
    <p class="no-history">No changes yet this session.</p>
  </div>
</div>

<script>
  const WEBHOOK_URL = 'https://barringer.app.n8n.cloud/webhook/website-agent'

  async function sendInstruction() {
    const textarea = document.getElementById('instruction')
    const btn = document.getElementById('submitBtn')
    const status = document.getElementById('status')
    const instruction = textarea.value.trim()

    if (!instruction) {
      status.className = 'status error'
      status.textContent = 'Please enter an instruction first.'
      return
    }

    btn.disabled = true
    status.className = 'status loading'
    status.innerHTML = '<span class="spinner"></span>Sending to agent...'

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ instruction })
      })

      if (res.ok) {
        status.className = 'status success'
        status.textContent = 'Done! Your site is updating now. Check barringer-consulting.vercel.app in about 60 seconds.'
        addToHistory(instruction)
        textarea.value = ''
      } else {
        throw new Error('Request failed with status ' + res.status)
      }
    } catch (err) {
      status.className = 'status error'
      status.textContent = 'Something went wrong. Check that your n8n workflow is active and try again.'
    }

    btn.disabled = false
  }

  function addToHistory(instruction) {
    const list = document.getElementById('historyList')
    const noHistory = list.querySelector('.no-history')
    if (noHistory) noHistory.remove()

    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    const item = document.createElement('div')
    item.className = 'history-item'
    item.innerHTML = `${instruction}<div class="time">${now}</div>`
    list.insertBefore(item, list.firstChild)
  }

  document.getElementById('instruction').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.metaKey) sendInstruction()
    if (e.key === 'Enter' && e.ctrlKey) sendInstruction()
  })
</script>

</body>
</html>
